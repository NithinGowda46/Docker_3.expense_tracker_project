services:
  mysql:
    restart: always
    image: mysql:latest
    container_name: mysql
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-unithin","-pnithin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3309:3306"

  javaapp:
    build: .
    image: nithingowda46/expensetracker:latest
    container_name: Expensetracker
    env_file:
      - .env
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    

volumes:
  mysql-data:
